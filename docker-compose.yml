version: '3.9'

services:
  app:
    build: .
    restart: on-failure
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongodb
      - rabbitmq

  mongodb:
    image: mongo:7
    restart: on-failure
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    restart: on-failure
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    ports:
      - "5672:5672"
      - "15672:15672"

